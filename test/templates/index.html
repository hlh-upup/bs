<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>选择文件夹</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 18px;
            line-height: 1.6;
            margin: 20px;
        }
        h1 {
            font-size: 24px;
            color: #333;
        }
        label, select, input, button {
            display: block;
            margin-bottom: 15px;
            font-size: 18px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 18px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>选择文件夹并输入用户信息</h1>
    <form method="POST" action="/select_folder">
        <label for="name">姓名:</label>
        <input type="text" id="name" name="name" required>

        <label for="age">年龄:</label>
        <input type="number" id="age" name="age" min="1" required>

        <label for="folder">选择文件夹:</label>
        <select id="folder" name="folder" required>
            {% for folder in subfolders %}
                <option value="{{ folder }}">{{ folder }}</option>
            {% endfor %}
        </select>

        <button type="submit">确认</button>
    </form>
</body>
</html>
